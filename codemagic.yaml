workflows:
  # ─────────────────────────────────────────────────────────────────────────────
  # Snap3D iOS — Derleme Doğrulaması (Simulator Build)
  #
  # Apple Developer hesabı gerektirmez.
  # Swift kodunun derlenip derlenmediğini doğrular.
  # Codemagic ücretsiz tier (500 dk/ay) yeterlidir.
  #
  # Fiziksel iPhone'a deploy etmek için:
  #   1. Apple Developer Program'a kaydol ($99/yıl)
  #   2. APP_STORE_CONNECT_ISSUER_ID, KEY_IDENTIFIER, PRIVATE_KEY ekle
  #   3. CODE_SIGNING_ALLOWED=YES yap, fetch-signing-files adımını aç
  # ─────────────────────────────────────────────────────────────────────────────
  snap3d-ios:
    name: Snap3D iOS Build Verification
    max_build_duration: 30

    environment:
      xcode: 16.2
      vars:
        XCODE_SCHEME: "Snap3DCapture"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode Project
        script: |
          cd ModuleA_iOS/Snap3DCapture
          xcodegen generate
          echo "✅ $(ls *.xcodeproj)"

      - name: Build (Simulator — No Signing)
        script: |
          set -xe
          cd ModuleA_iOS/Snap3DCapture
          xcodebuild build \
            -project Snap3DCapture.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

    artifacts:
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - omerfaruksaskan@gmail.com
        notify:
          success: true
          failure: true
